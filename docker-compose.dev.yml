version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8001:8000"
    env_file:
      - .env.dev
    volumes:
      - .:/app
    depends_on:
      - postgres
      - minio
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/documents_db

  postgres:
    image: postgres:15
    container_name: dev_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=documents_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: dev_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
