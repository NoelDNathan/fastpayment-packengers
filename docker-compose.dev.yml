version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8001:8000"
    env_file:
      - .env.dev
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql+asyncpg://fastpayment:fastpayment@db:5432/fastpayment_dev

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=fastpayment
      - POSTGRES_PASSWORD=fastpayment
      - POSTGRES_DB=fastpayment_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

volumes:
  postgres_data_dev:
